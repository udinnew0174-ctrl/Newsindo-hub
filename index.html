<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>NewsHub Indonesia · final</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo"><h1>NewsHub Indonesia</h1></div>
    <button class="dark-toggle" id="darkToggle"><i class="fas fa-moon"></i></button>
  </header>

  <div class="container">
    <div class="hero-section" id="heroContainer"></div>

    <div class="refresh-bar">
      <div class="news-count" id="newsCount">
        <i class="fas fa-newspaper"></i> <span>0</span> berita
      </div>
      <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div id="skeletonContainer" class="skeleton-grid" style="display: none;"></div>
    <div id="newsGrid" class="news-grid"></div>
    <div id="errorContainer" style="display: none; padding: 2rem; text-align: center;"></div>
  </div>

  <div id="newsModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="closeModal">&times;</span>
      <div id="modalBody"></div>
    </div>
  </div>

  <button class="scroll-top" id="scrollTopBtn"><i class="fas fa-arrow-up"></i></button>

  <footer>
    <div style="font-size: 1.5rem; font-weight: 600;">NewsHub Indonesia</div>
    <div style="margin: 8px 0 4px;">Portal Berita Modern</div>
    <div style="font-size:0.9rem; opacity:0.6;">Powered by Udin AI</div>
  </footer>

  <!-- Config & Script -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
